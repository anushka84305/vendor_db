<!DOCTYPE html>
<html>
<head>
    <title>Vendor Comparison System</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
            background: #f0f8ff;
        }
        h1 { color: #333; }

            display: inline-block;
