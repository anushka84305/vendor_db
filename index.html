<!DOCTYPE html><html>
<head>
    <title>Vendor Comparison System</title><meta name="viewport" content="width=device-width, initial-scale=1">

<style>

    body {
        font-family: Arial, sans-serif;
        background: #f0f8ff;
        margin:0;
        padding:0;
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
    }

    .container{
        text-align:center;
        background:white;
        padding:40px;
        border-radius:10px;
        box-shadow:0 0 10px rgba(0,0,0,0.15);
    }

    h1{
        color:#333;
        margin-bottom:25px;
    }

    a.btn{
        display:inline-block;
        margin:10px;
        padding:12px 25px;
        background:#007BFF;
        color:white;
        text-decoration:none;
        border-radius:6px;
        font-size:16px;
        transition:0.3s;
    }

    a.btn:hover{
        background:#0056b3;
    }

</style>

</head><body><div class="container"><h1>Welcome to Vendor Comparison System</h1><a class="btn" href="/login">Login</a>

<a class="btn" href="/signup">Sign Up</a>

<a class="btn" href="/vendors">View Vendors</a>

</div></body>
</html>
