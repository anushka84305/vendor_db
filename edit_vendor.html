<!DOCTYPE html><html>
<head>
    <title>Edit Vendor</title><style>
    body{
        font-family: Arial;
        background:#f4f7fb;
        padding:40px;
    }

    h1{
        color:#333;
    }

    form{
        background:white;
        padding:25px;
        width:450px;
        border-radius:8px;
        box-shadow:0px 0px 10px rgba(0,0,0,0.1);
    }

    input,textarea{
        width:100%;
        padding:8px;
        margin-top:5px;
        margin-bottom:15px;
        border:1px solid #ccc;
        border-radius:4px;
    }

    button{
        background:#28a745;
        color:white;
        padding:10px 18px;
        border:none;
        border-radius:5px;
        cursor:pointer;
    }

    button:hover{
        background:#218838;
    }

    a{
        margin-left:15px;
        text-decoration:none;
        color:#007BFF;
    }
</style>

</head><body><h1>Edit Vendor</h1><form method="POST"><label>Vendor Name</label>
<input type="text" name="vendor_name" value="{{vendor.vendor_name}}" required>

<label>Item</label>
<input type="text" name="item" value="{{vendor.item}}" required>

<label>Specifications</label>

<textarea name="specifications">{{vendor.specifications}}</textarea><label>Price</label>
<input type="number" step="0.01" name="price" value="{{vendor.price}}" required>

<label>GST Percent</label>
<input type="number" step="0.01" name="gst_percent" value="{{vendor.gst_percent}}" required>

<label>Additional Charges</label>
<input type="number" step="0.01" name="additional_charges" value="{{vendor.additional_charges}}">

<label>Contact</label>
<input type="text" name="contact" value="{{vendor.contact}}">

<label>Category</label>
<input type="text" name="category" value="{{vendor.category}}">

<button type="submit">Update Vendor</button>

<a href="/vendors">Cancel</a>

</form></body>
</html>
