<!DOCTYPE html>
<html>
<head>
<title>Edit Vendor</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>

<body>

<div class="container mt-4">

<h2>Edit Vendor</h2>

<form method="POST">

<input type="text" name="vendor_name" class="form-control mb-2" value="{{vendor.vendor_name}}">

<input type="text" name="item" class="form-control mb-2" value="{{vendor.item}}">

<input type="text" name="specifications" class="form-control mb-2" value="{{vendor.specifications}}">

<input type="number" step="0.01" name="price" class="form-control mb-2" value="{{vendor.price}}">

<input type="number" step="0.01" name="gst_percent" class="form-control mb-2" value="{{vendor.gst_percent}}">

<input type="number" step="0.01" name="additional_charges" class="form-control mb-2" value="{{vendor.additional_charges}}">

<input type="text" name="contact" class="form-control mb-2" value="{{vendor.contact}}">

<input type="text" name="category" class="form-control mb-3" value="{{vendor.category}}">

<button class="btn btn-success">Update Vendor</button>

</form>

</div>

</body>
</html>
