<!DOCTYPE html>
<html>
<head>
    <title>Vendor Detail</title>
    <style>
        body { font-family: Arial; background: #f0f8ff; padding: 20px; }
        div.container { background: #fff; padding: 20px; border-radius: 8px; max-width: 600px; margin:auto; }
        a { text-decoration:none; padding:5px 10px; background:#007BFF; color:white; border-radius:4px; }
        a:hover { opacity:0.8; }
    </style>
</head>
<body>
    <div class="container">
        <h2>{{vendor.vendor_name}}</h2>
        <p><strong>Item:</strong> {{vendor.item}}</p>
        <p><strong>Category:</strong> {{vendor.category}}</p>
        <p><strong>Specifications:</strong> {{vendor.specifications}}</p>
        <p><strong>Price:</strong> {{vendor.price}}</p>
        <p><strong>GST:</strong> {{vendor.gst_percent}}</p>
        <p><strong>Charges:</strong> {{vendor.additional_charges}}</p>
        <p><strong>Total:</strong> {{vendor.total}}</p>
        <p><strong>Contact:</strong> {{vendor.contact}}</p>
        <a href="/download/{{vendor.id}}">Download PDF</a>
        <a href="/vendors">Back to List</a>
    </div>
</body>
</html>
