<!DOCTYPE html><html>
<head>
    <title>Login</title><meta name="viewport" content="width=device-width, initial-scale=1">

<style>

    body{
        font-family: Arial, sans-serif;
        background:#f0f8ff;
        margin:0;
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
    }

    .login-box{
        background:white;
        padding:35px;
        width:350px;
        border-radius:8px;
        box-shadow:0 0 12px rgba(0,0,0,0.15);
        text-align:center;
    }

    h2{
        margin-bottom:20px;
    }

    input{
        width:100%;
        padding:10px;
        margin:8px 0;
        border:1px solid #ccc;
        border-radius:5px;
    }

    button{
        width:100%;
        padding:10px;
        background:#007BFF;
        color:white;
        border:none;
        border-radius:5px;
        cursor:pointer;
        margin-top:10px;
    }

    button:hover{
        background:#0056b3;
    }

    p{
        margin-top:15px;
    }

    a{
        text-decoration:none;
        color:#007BFF;
    }

</style>

</head><body><div class="login-box"><h2>Login</h2><form method="POST"><input type="email" name="email" placeholder="Email" required><input type="password" name="password" placeholder="Password" required><button type="submit">Login</button>

</form><p>Don't have an account? <a href="/signup">Sign Up</a></p></div></body>
</html>
