<!DOCTYPE html>
<html>
<head>
    <title>Add Vendor</title>
    <style>
        body { font-family: Arial; background: #f0f8ff; padding: 50px; }
        form { background: #fff; max-width: 500px; margin: auto; padding: 20px; border-radius: 8px; }
        input, select { width: 100%; padding: 10px; margin: 8px 0; }
        button { padding: 10px 15px; background: #28a745; color: white; border: none; cursor: pointer; border-radius: 5px; }
        button:hover { background: #218838; }
        a { text-decoration:none; color:#007BFF; }
    </style>
</head>
<body>
    <h2>Add Vendor</h2>
    <form method="POST">
        <input type="text" name="vendor_name" placeholder="Vendor Name" required>
        <input type="text" name="item" placeholder="Item" required>
        <input type="text" name="specifications" placeholder="Specifications" required>
        <input type="number" name="price" placeholder="Price" required>
        <input type="number" name="gst_percent" placeholder="GST (%)" required>
        <input type="number" name="additional_charges" placeholder="Additional Charges" required>
        <input type="text" name="contact" placeholder="Contact" required>
        <input type="text" name="category" placeholder="Category" required>
        <button type="submit">Add Vendor</button>
    </form>
    <p><a href="/vendors">Back to Vendor List</a></p>
</body>
</html>
