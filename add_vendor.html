<!DOCTYPE html>
<html>
<head>
    <title>Add Vendor</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 50px; }
        input, textarea { width: 300px; padding: 5px; margin: 5px 0; }
        button { padding: 8px 15px; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Add Your Vendor</h1>
    <form method="POST">
        <label>Vendor Name:</label><br>
        <input type="text" name="vendor_name" required><br>

        <label>Item:</label><br>
        <input type="text" name="item" required><br>

        <label>Category:</label><br>
        <input type="text" name="category" required><br>

        <label>Price:</label><br>
        <input type="number" step="0.01" name="price" required><br>

        <label>GST Percent:</label><br>
        <input type="number" step="0.01" name="gst_percent" required><br>

        <label>Additional Charges:</label><br>
        <input type="number" step="0.01" name="additional_charges" required><br>

        <label>Specifications:</label><br>
        <textarea name="specifications"></textarea><br>

        <label>Contact:</label><br>
        <input type="text" name="contact" required><br>

        <button type="submit">Add Vendor</button>
    </form>
    <br>
    <a href="/vendors"><button>Back to Vendor List</button></a>
</body>
</html>
